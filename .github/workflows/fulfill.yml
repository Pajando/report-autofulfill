name: Auto-fulfill audit reports
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  fulfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet reportlab
      - run: python fulfill.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
