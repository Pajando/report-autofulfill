name: relay-probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: check files
        run: |
          for p in llms.txt sitemap.xml robots.txt; do
            echo "=== https://cliffledevineyards.com/$p ==="
            curl -s -m 20 -D /tmp/h -o /tmp/b -L "https://cliffledevineyards.com/$p" || echo "FAILED exit $?"
            grep -Ei "^HTTP|content-type" /tmp/h | head -4
            echo "--- first 3 lines of body:"
            head -c 400 /tmp/b | head -3
            echo ""
          done
